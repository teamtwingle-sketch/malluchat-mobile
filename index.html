  <style>
    /* Premium Loading Screen */
    #root-loader {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background: radial-gradient(circle at center, #1a1d23 0%, #0f1115 100%);
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .loader-brand {
      position: relative;
      margin-bottom: 2rem;
      animation: pulse-logo 2s ease-in-out infinite;
    }

    @keyframes pulse-logo {

      0%,
      100% {
        transform: scale(1);
        filter: drop-shadow(0 0 10px rgba(74, 222, 128, 0.2));
      }

      50% {
        transform: scale(1.05);
        filter: drop-shadow(0 0 25px rgba(74, 222, 128, 0.5));
      }
    }

    .loader-text {
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(to right, #4ade80, #065f46);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .loader-bar {
      width: 150px;
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      margin-top: 1rem;
      overflow: hidden;
      position: relative;
    }

    .loader-bar::after {
      content: '';
      position: absolute;
      left: -100%;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, transparent, #4ade80, transparent);
      animation: loading-bar 1.5s infinite;
    }

    @keyframes loading-bar {
      100% {
        left: 100%;
      }
    }
  </style>
</head>
