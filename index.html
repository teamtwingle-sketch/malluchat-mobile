    /* App-like Loading Animation */
    #root-loader {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;

    }

    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(74, 222, 128, 0.2);
      border-radius: 50%;
      border-top-color: #4ade80;
      animation: spin 1s ease-in-out infinite;

    @keyframes spin {
